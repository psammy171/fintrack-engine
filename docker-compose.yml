networks:
    database-network:
        name: database-network
        external: true

services:
    fintrack:
        build: .
        image: fintrack:${TAG}
        container_name: fintrack
        ports:
            - "3005:8080"
        environment:
            - SPRING_PROFILES_ACTIVE=${ENV:-local}
        restart: unless-stopped
        networks:
            - database-network
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--no-verbose",
                    "--tries=1",
                    "--spider",
                    "http://localhost:8080/actuator/health",
                ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s
