networks:
    database-network:
        name: database-network
        external: true

services:
    fintrack:
        build: .
        image: fintrack:${TAG}
        container_name: fintrack
        ports:
            - "3005:8080"
        environment:
            - SPRING_PROFILES_ACTIVE=${ENV:-local}
        restart: unless-stopped
        networks:
            - database-network
